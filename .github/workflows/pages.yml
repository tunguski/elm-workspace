name: Build, test & deploy to GitHub Pages

# Compiles the elm-workspace demo to a single self-contained page, runs the headless test suite
# (and renders it as a human-readable report), and publishes both to
# https://tunguski.github.io/elm-workspace/.
#
# The library targets the elm-lang compiler (github.com/tunguski/elm-lang), which lives in a
# separate repo, so the build checks that out, packages it into a runnable elm.jar, runs the
# tests, then `elm make` to produce the page. Like the other elm-lang example apps it compiles
# with --no-check. The deploy is gated on the tests passing.

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out elm-workspace
        uses: actions/checkout@v4

      - name: Check out the elm-lang compiler
        uses: actions/checkout@v4
        with:
          repository: tunguski/elm-lang
          ref: master
          path: elm-lang

      - name: Set up GraalVM for JDK 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          cache: 'maven'
          cache-dependency-path: elm-lang/pom.xml

      - name: Build the elm compiler (elm.jar)
        working-directory: elm-lang
        run: |
          chmod +x ./mvnw
          ./mvnw -B -ntp clean package -DskipTests

      - name: Run the test suite and render the report
        run: |
          mkdir -p public
          set +e
          java -jar elm-lang/target/elm.jar test --report=json \
            test/WorkspaceTest.elm \
            src/Workspace/Types.elm src/Workspace/Permissions.elm \
            src/Workspace/Comment.elm src/Workspace/Db.elm \
            src/Workspace/Table.elm src/Workspace/Serialize.elm > report.json
          code=$?
          set -e
          perl tools/gen-test-report.pl report.json public/tests.html
          fails=$(grep -oE '"failed":[0-9]+' report.json | head -1 | grep -oE '[0-9]+' || echo 0)
          echo "test runner exit=$code, failed=$fails"
          if [ "$code" -ne 0 ] || [ "${fails:-0}" -ne 0 ]; then
            echo "::error::tests failed — not deploying"
            exit 1
          fi

      - name: Compile the demo to public/index.html
        run: |
          java -jar elm-lang/target/elm.jar make \
            src/Main.elm --project=elm.json -o public/index.html --no-check
          CSSFILE=src/workspace.css perl -0777 -pi -e '
            s#<meta charset="utf-8">#<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">#;
            s#</head>#<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons\@1.11.3/font/bootstrap-icons.css"></head>#;
            open(my $f, "<", $ENV{CSSFILE}) or die "no workspace.css: $!";
            local $/; my $css = <$f>; close($f);
            s#</head>#"<style id=\"ws-app-css\">".$css."</style></head>"#e;
          ' public/index.html
          ls -la public

      - name: Stamp commit hash + build time into the footer
        run: |
          SHA=$(git rev-parse --short HEAD)
          WHEN=$(date -u '+%Y-%m-%d %H:%M UTC')
          export STAMP="built $WHEN · $SHA"
          find public -name '*.html' -print0 | xargs -0 -r perl -0777 -pi -e '
            my $t = $ENV{STAMP};
            my $s = "<script>(function(){function a(){"
                  . "if(document.getElementById(\"build-stamp\"))return;"
                  . "var d=document.createElement(\"div\");d.id=\"build-stamp\";d.textContent=\"$t\";"
                  . "d.style.cssText=\"position:fixed;bottom:4px;right:6px;z-index:2147483647;"
                  . "font:11px/1.45 ui-monospace,Menlo,Consolas,monospace;color:rgba(97,112,138,.72);"
                  . "background:rgba(245,247,251,.82);padding:2px 7px;border-radius:6px;pointer-events:none;"
                  . "letter-spacing:.02em\";(document.documentElement||document.body).appendChild(d);}"
                  . "if(document.readyState!=\"loading\")a();"
                  . "else document.addEventListener(\"DOMContentLoaded\",a);})();<\/script>";
            if    (s#</body>#$s</body>#) {}
            elsif (s#</html>#$s</html>#) {}
            else  { $_ .= $s }
          '

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
